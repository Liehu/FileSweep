categories:
    - name: 安装包
      target_path: Installers
      extensions:
        - .exe
        - .msi
        - .pkg
        - .dmg
        - .deb
        - .rpm
        - .AppImage
      name_keywords:
        - setup
        - install
        - installer
        - update
    - name: 文档
      target_path: Docs
      extensions:
        - .pdf
        - .docx
        - .doc
        - .xls
        - .xlsx
        - .ppt
        - .pptx
        - .md
        - .txt
        - .epub
      name_keywords: []
    - name: 压缩包
      target_path: Archives
      extensions:
        - .zip
        - .7z
        - .rar
        - .gz
        - .tar
        - .xz
        - .bz2
        - .tar.gz
        - .tar.xz
        - .tar.bz2
      name_keywords: []
    - name: 脚本
      target_path: Scripts
      extensions:
        - .sh
        - .bash
        - .py
        - .bat
        - .cmd
        - .ps1
        - .rb
        - .pl
      name_keywords: []
    - name: Java工具
      target_path: Jars
      extensions:
        - .jar
        - .war
      name_keywords: []
    - name: 镜像
      target_path: Images
      extensions:
        - .iso
        - .img
        - .vmdk
        - .vhd
      name_keywords: []
    - name: 视频
      target_path: Videos
      extensions:
        - .mp4
        - .mkv
        - .avi
        - .mov
        - .wmv
        - .flv
      name_keywords: []
    - name: 音频
      target_path: Audio
      extensions:
        - .mp3
        - .flac
        - .wav
        - .aac
        - .ogg
        - .wma
      name_keywords: []
    - name: 图片
      target_path: Pictures
      extensions:
        - .png
        - .jpg
        - .jpeg
        - .webp
        - .gif
        - .svg
      name_keywords: []
    - name: 安装包\安卓
      target_path: Installers\apks
      extensions:
        - .apk
      name_keywords: []
